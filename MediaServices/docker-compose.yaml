version: "3.1"
services:
  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:latest
    container_name: cleanuparr
    restart: unless-stopped
    # ports:
    # - "11011:11011"
    volumes:
    - cleanuparr_config:/config
    environment:
      # BASE_PATH:
      PUID: ${PUID}
      GUID: ${GUID}
      TZ: ${TZ}
      UMASK: 22
  # newtarr:
  #   image: ghcr.io/elfhosted/newtarr:1.0.0
  #   container_name: newtarr
  #   restart: always
  #   # ports:
  #   #   - "9705:9705"
  #   volumes:
  #   - newtarr_config:/config
  #   env_file: stack.env
  #   environment:
  #     PUID: ${PUID}
  #     GUID: ${GUID}
  #     TZ: ${TZ}
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      PUID: ${PUID}
      GUID: ${GUID}
    env_file:
    - stack.env
    volumes:
    - prowlarr_config:/config
    #ports:
    #- 9696:9696
    restart: unless-stopped
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      PUID: ${PUID}
      GUID: ${GUID}
    env_file: stack.env
    volumes:
    - qbittorrent_config:/config
    - qbittorrent_data:/data/torrents/
    #ports:
    #- 8080:8080
    #- 6881:6881
    #- 6881:6881/udp
    restart: unless-stopped
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      PUID: ${PUID}
      GUID: ${GUID}
    env_file: stack.env
    volumes:
    - sonarr_config:/config
    - sonarr_data:/data
    #ports:
    #- 8989:8989
    restart: unless-stopped
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      PUID: ${PUID}
      GUID: ${GUID}
    env_file: stack.env
    volumes:
    - radarr_config:/config
    - radarr_data:/data #optional
    #ports:
    #- 7878:7878
    restart: unless-stopped
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      PUID: ${PUID}
      GUID: ${GUID}
    env_file: stack.env
    volumes:
    - jellyfin_config:/config
    - jellyfin_data:/data
    #ports:
    #  - 8096:8096
    #- 8920:8920 #optional
    #- 7359:7359/udp #optional
    #- 1900:1900/udp #optional
    restart: unless-stopped
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      PUID: ${PUID}
      GUID: ${GUID}
    env_file: stack.env
    #ports:
    #- 5055:5055
    volumes:
    - jellyseerr_config:/app/config
    #- /pool_raid0/docker/config/media-services/jellyseerr:/app/config
    restart: unless-stopped
  unpackerr:
    image: golift/unpackerr
    container_name: unpackerr
    volumes:
    - unpackerr_config:/config
    - unpackerr_data:/data
    - unpackerr_downloads:/data/torrents
    restart: always
    # Get the user:group correct so unpackerr can read and write to your files.
    user: ${PUID}:${PGID}
    env_file: stack.env
    environment:
      PUID: ${PUID}
      GUID: ${GUID}
      TZ: ${TZ}
      ## Global Settings
      UN_DEBUG: false
      UN_QUIET: false
      UN_ERROR_STDERR: false
      UN_ACTIVITY: false
      UN_LOG_QUEUES: 1m
      UN_LOG_FILE: config/unpackerr.log
      UN_LOG_FILES: 10
      UN_LOG_FILE_MB: 10
      UN_LOG_FILE_MODE: 600
      UN_INTERVAL: 2m
      UN_START_DELAY: 1m
      UN_RETRY_DELAY: 5m
      UN_MAX_RETRIES: 3
      UN_PARALLEL: 1
      UN_FILE_MODE: 644
      UN_DIR_MODE: 755
      # Web Server
      # UN_WEBSERVER_METRICS : false
      # UN_WEBSERVER_LISTEN_ADDR : 0.0.0.0:5656
      # UN_WEBSERVER_LOG_FILE : 
      # UN_WEBSERVER_LOG_FILES : 10
      # UN_WEBSERVER_LOG_FILE_MB : 10
      # UN_WEBSERVER_SSL_CERT_FILE : 
      # UN_WEBSERVER_SSL_KEY_FILE : 
      # UN_WEBSERVER_URLBASE : /
      # UN_WEBSERVER_UPSTREAMS : 
      ## Folder Settings
      UN_FOLDERS_INTERVAL: 1s
      UN_FOLDERS_BUFFER: 20000
      ## Sonarr Settings
      UN_SONARR_0_URL: https://sonarr.random-plebs.com
      UN_SONARR_0_PATHS_0: /data
      UN_SONARR_0_PROTOCOLS: torrent
      UN_SONARR_0_TIMEOUT: 10s
      UN_SONARR_0_DELETE_DELAY: 5m
      UN_SONARR_0_DELETE_ORIG: false
      UN_SONARR_0_SYNCTHING: false
      ## Radarr Settings
      UN_RADARR_0_URL: https://radarr.random-plebs.com
      UN_RADARR_0_PATHS_0: /data
      UN_RADARR_0_PROTOCOLS: torrent
      UN_RADARR_0_TIMEOUT: 10s
      UN_RADARR_0_DELETE_DELAY: 5m
      UN_RADARR_0_DELETE_ORIG: false
      UN_RADARR_0_SYNCTHING: false

volumes:
  jackett_config:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /pool_raid0/docker/config/media-services/jackett
  qbittorrent_config:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /pool_raid0/docker/config/media-services/qbittorrent
  qbittorrent_data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /pool_raid0/docker/data/media-services/torrents
  sonarr_config:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /pool_raid0/docker/config/media-services/sonarr
  sonarr_data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /pool_raid0/docker/data/media-services
  radarr_config:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /pool_raid0/docker/config/media-services/radarr
  radarr_data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /pool_raid0/docker/data/media-services
  unpackerr_config:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /pool_raid0/docker/config/media-services/unpackerr
  unpackerr_data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /pool_raid0/docker/data/media-services
  unpackerr_downloads:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /pool_raid0/docker/data/media-services/torrents
  jellyfin_data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /pool_raid0/docker/data/media-services/media
  jellyfin_config:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /pool_raid0/docker/config/media-services/jellyfin
  jellyseerr_config:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /pool_raid0/docker/config/media-services/jellyseerr
  prowlarr_config:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /pool_raid0/docker/config/media-services/prowlarr
  newtarr_config:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /pool_raid0/docker/config/media-services/newtarr
  cleanuparr_config:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /pool_raid0/docker/config/media-services/cleanuparr
